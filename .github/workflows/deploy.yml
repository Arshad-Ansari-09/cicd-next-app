
name: Integration

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - run: docker build . -t afreenafreen/cicd-next-app
    - run: echo "${{secrets.DOCKERHUBPASS}}" | docker login -u ${{secrets.DOCKERHUBUSERNAME}} --password-stdin
    - run: docker push afreenafreen/cicd-next-app:latest
